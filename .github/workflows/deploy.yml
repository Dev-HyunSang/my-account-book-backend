name: Build, Push & Deploy

# Runs on merge to main:
#   1. build the Docker image and push it to ghcr.io (built-in GITHUB_TOKEN, no PAT)
#   2. a self-hosted runner ON the deploy host pulls & restarts via docker compose
#
# Prerequisites on the deploy host (one-time):
#   - a self-hosted GitHub Actions runner is registered & running
#   - the runner's user is in the `docker` group and is `docker login ghcr.io`
#   - /opt/account-book/.env.prod exists (compose reads it)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/dev-hyunsang/account-book-backend
  DEPLOY_DIR: /opt/account-book

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: ref
        run: echo "image=${IMAGE_NAME}:sha-$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: |
          set -euo pipefail
          # Keep the compose file on the host in sync with the repo, then run it
          # from DEPLOY_DIR so it picks up the .env.prod that lives there.
          cp docker-compose.prod.yml "$DEPLOY_DIR/docker-compose.prod.yml"
          cd "$DEPLOY_DIR"
          export IMAGE
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d postgres redis
          docker compose -f docker-compose.prod.yml run --rm app npm run migration:run:prod
          docker compose -f docker-compose.prod.yml up -d app
          docker image prune -f
          echo "Deployed $IMAGE"
