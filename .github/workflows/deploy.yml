name: Build, Push & Deploy

# Runs on merge to main:
#   1. build the Docker image and push it to ghcr.io (built-in GITHUB_TOKEN, no PAT)
#   2. a self-hosted runner ON the deploy host pulls & restarts via docker compose
#
# Prerequisites (one-time):
#   - a self-hosted GitHub Actions runner is registered & running on the host
#   - `docker` is on the runner's PATH (Docker Desktop running)
#   - repo secret ENV_PROD holds the full .env.prod (written out each deploy)
#   - ghcr auth is written to an isolated docker config in the step (no host login)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/dev-hyunsang/account-book-backend

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: ref
        run: echo "image=${IMAGE_NAME}:sha-$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-push
    runs-on: self-hosted
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: |
          set -euo pipefail
          # Isolated docker config with the ghcr auth written directly, so we
          # never invoke the osxkeychain helper (it can't unlock in CI: -25308).
          DOCKER_CONFIG="$(mktemp -d)"; export DOCKER_CONFIG
          trap 'rm -rf "$DOCKER_CONFIG"' EXIT
          AUTH=$(printf '%s:%s' "$GHCR_USER" "$GHCR_TOKEN" | base64 | tr -d '\n')
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' "$AUTH" > "$DOCKER_CONFIG/config.json"
          # The compose plugin lives in the host config dir we just bypassed —
          # link it back in so `docker compose` is still found.
          ln -s "$HOME/.docker/cli-plugins" "$DOCKER_CONFIG/cli-plugins"
          # Deploy dir lives in the runner user's home — no sudo / /opt needed.
          # Keep the compose file in sync with the repo, then run it from there
          # so it picks up the .env.prod that lives alongside it.
          DEPLOY_DIR="$HOME/dev/my-account-book-backend"
          mkdir -p "$DEPLOY_DIR"
          cp docker-compose.prod.yml "$DEPLOY_DIR/docker-compose.prod.yml"
          # Write .env.prod from the secret each run — no reliance on a
          # hand-placed host file the runner may not see.
          printf '%s' "$ENV_PROD" > "$DEPLOY_DIR/.env.prod"
          cd "$DEPLOY_DIR"
          export IMAGE
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d postgres redis
          docker compose -f docker-compose.prod.yml run --rm app npm run migration:run:prod
          docker compose -f docker-compose.prod.yml up -d app
          docker image prune -f
          echo "Deployed $IMAGE"
