name: Deploy (trigger Jenkins)

# Runs after merge to main. The GitHub-hosted runner joins the tailnet via
# Tailscale, then kicks off the Jenkins job (build/test/push/deploy lives in
# the Jenkinsfile). No public port on Jenkins required.
#
# Required repo secrets:
#   TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET  -> Tailscale OAuth client (scope: auth_keys), with an ACL tag like tag:ci
#   JENKINS_URL    -> e.g. http://jenkins.<tailnet>.ts.net:8080
#   JENKINS_USER   -> Jenkins username
#   JENKINS_TOKEN  -> that user's API token (Jenkins > user > Configure > API Token)
#   JENKINS_JOB    -> job name, e.g. account-book
# ACL: allow tag:ci to reach the Jenkins node on its port.

on:
  push:
    branches: [main]

jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest
    steps:
      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger Jenkins build
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          JENKINS_JOB: ${{ secrets.JENKINS_JOB }}
        run: |
          set -euo pipefail
          # ponytail: API-token auth is CSRF-crumb exempt. If "API token does not
          # require CSRF protection" is disabled on this Jenkins, add a crumb fetch.
          curl -fsS -X POST --user "$JENKINS_USER:$JENKINS_TOKEN" \
            "$JENKINS_URL/job/$JENKINS_JOB/build"
          echo "Triggered $JENKINS_JOB"
