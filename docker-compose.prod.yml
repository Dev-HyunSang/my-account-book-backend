# Production stack for a single host.
# IMAGE is injected by the CI pipeline (defaults to :latest for manual runs).
#
# Deploy order (handled by the GitHub Actions deploy job):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d postgres redis
#   docker compose -f docker-compose.prod.yml run --rm app npm run migration:run:prod
#   docker compose -f docker-compose.prod.yml up -d app

services:
  app:
    image: ${IMAGE:-account-book:latest}
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    # Single-instance only — do NOT scale this service.
    # The in-process scheduler would produce duplicate ledger writes.

  postgres:
    image: postgres:16-alpine
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
