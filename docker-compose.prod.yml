# Production stack for a single host.
# IMAGE is injected by the CI pipeline (defaults to :latest for manual runs).
#
# Deploy order (handled by the GitHub Actions deploy job):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d postgres redis
#   docker compose -f docker-compose.prod.yml run --rm app npm run migration:run:prod
#   docker compose -f docker-compose.prod.yml up -d app

services:
  app:
    image: ${IMAGE:-account-book:latest}
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # host 4040 → container 3000 (3000 is taken by Grafana on the deploy host)
      - "4040:3000"
    restart: unless-stopped
    # Single-instance only — do NOT scale this service.
    # The in-process scheduler would produce duplicate ledger writes.

  postgres:
    image: postgres:16-alpine
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Self-hosted push server for mobile notifications (ntfy.sh app subscribes).
  # The app publishes to it at http://ntfy/<topic> over the compose network.
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    command: serve
    environment:
      # Public URL the mobile app subscribes to — set to your real domain.
      NTFY_BASE_URL: ${NTFY_BASE_URL:-http://localhost:8090}
      # Listen on 8090 in-container so it matches the published port.
      NTFY_LISTEN_HTTP: ":8090"
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_BEHIND_PROXY: "true"
      # Auth: nobody can read/write without an account. Create users after deploy
      # (see README). Token/creds go in the mobile app and the NestJS publisher.
      NTFY_AUTH_FILE: /var/cache/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      TZ: Asia/Seoul
    volumes:
      - ntfy-cache:/var/cache/ntfy
    ports:
      # host 8090 → container 80 (3000 Grafana, 4040 app already taken)
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/v1/health | grep -q '\"healthy\":true'"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  ntfy-cache:
