services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: accountbook_test
      POSTGRES_PASSWORD: accountbook_test
      POSTGRES_DB: accountbook_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    tmpfs:
      - /data
